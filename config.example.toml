# Copy to ~/.config/beepify/config.toml and fill in your channel(s).
# This file (the example) is safe to commit; your real config.toml is NOT.

debounce_seconds = 20
host_label = ""              # empty = auto-detect ComputerName
locale = "en"                # "en" (default) | "zh-CN"
notify_idle = false          # push the "waiting for your input" idle reminder that
                             # fires ~60s after a turn ends? false (default) avoids a
                             # duplicate of the Stop/done notification.

# Add one [[channels]] block per push target. Unconfigured channels are skipped.

# [[channels]]
# type   = "bark"
# key    = "your-bark-key"
# server = "https://api.day.app"
# icon   = "https://example.com/icon.png"   # optional

# [[channels]]
# type   = "ntfy"
# topic  = "your-secret-topic"
# server = "https://ntfy.sh"

# Desktop notifications (macOS). provider = "native" (Notification Center; uses
# terminal-notifier if installed, else osascript) or "open-island" (drives the
# Dynamic Island app — install Open Island separately; auto-detected).
# [[channels]]
# type = "desktop"
# provider = "native"
# sound = ""               # optional; native only
# open_island_command = "" # optional; auto-detected if empty

# Codex CLI: channels above are shared. To let Codex trigger Beepify, run
#   beepify init --agent codex   (or choose Codex in `beepify setup`)
# which wires a managed [hooks] block into ~/.codex/config.toml.
